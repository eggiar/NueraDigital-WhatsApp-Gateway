version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wa_gateway_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wa_gateway_db
    ports:
      - "3306:3306"
    volumes:
      - wa_gateway_db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: wa_gateway_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - wa_gateway_redis_data:/data

  api-server:
    build:
      context: ./apps/api-server
    container_name: wa_gateway_api
    restart: always
    environment:
      - DATABASE_URL=mysql://root:rootpassword@mysql:3306/wa_gateway_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=super_secret_jwt_key
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./apps/api-server:/app
      - /app/node_modules
    command: npm run dev

  dashboard:
    build:
      context: ./apps/dashboard
    container_name: wa_gateway_dashboard
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api-server
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000
    volumes:
      - ./apps/dashboard:/app
      - /app/node_modules
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: wa_gateway_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-server
      - dashboard

volumes:
  wa_gateway_db_data:
  wa_gateway_redis_data:
